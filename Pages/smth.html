<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Happy Birthday!</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: "Comic Sans MS", system-ui, sans-serif;
    }

    .card {
      background: white;
      padding: 30px 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 400px;
    }

    .title {
      font-size: 2rem;
      color: #ff4b8b;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #555;
      margin-bottom: 20px;
    }

    .balloons {
      font-size: 2rem;
      margin-bottom: 15px;
    }

    .message {
      font-size: 1rem;
      color: #444;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="balloons">🎈🎉🎈</div>
    <div class="title">Happy Birthday, Lil Sis! 💖</div>
    <div class="subtitle">You’re the star today ✨</div>
    <p class="message">
      I’m so proud of you and so lucky to have you as my sister.<br>
      I hope your day is full of cake, laughter, and all your favorite things.
      <br><br>
      Love you always 💕
    </p>
  </div>
</body>
</html>
